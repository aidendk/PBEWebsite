<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Brotherhood of Engineers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" href="PBEimages\favicon.ico">
    <meta name="theme-color" content="black">
    <script type="text/javascript">
        var submitted = false;

        function validateForm() {
            var inputs = document.querySelectorAll('.contactFlex input[type="text"], .contactFlex textarea');
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === "") {
                    alert("All fields must be filled out");
                    return false;
                }
            }
            submitted = true;
            return true;
        }
    </script>
  <script src="components/page-hero.js" defer></script>
  <script src="components/navbar.js" defer></script>
  <script src="components/footer.js" defer></script>
  <script src="components/back-to-top.js" defer></script>
  <script src="components/site-behavior.js" defer></script>
</head>
<body>
<div data-page-hero data-hero-class="contact2-header" data-hero-title="Contact "></div>
  <section class="contactus">
    <h2>Howdy, please fill out the form below and we will contact you shortly!</h2>
    <section class="recruitment">
        <div></div>
        <iframe name="hiddenConfirm" id="hiddenConfirm" style="display:none;" onload="if(submitted){window.location='./contactSent';}"></iframe>
        <form class="contactFlex" action="https://docs.google.com/forms/d/e/1FAIpQLSc-2B3gZ5GyZjCL8CBLEfbWHRMWK4srOjRAgpzEBfDfjC8QiQ/formResponse" method="post" target="hiddenConfirm" onsubmit="return validateForm()">
            <div class="input-group">
                <label for="entry.1180153643">First Name</label>
                <input type="text" name="entry.1180153643" placeholder="First">
            </div>
            <div class="input-group">
                <label for="entry.1975216193">Last Name</label>
                <input type="text" name="entry.1975216193" placeholder="Last">
            </div>
            <div class="input-group">
                <label for="entry.1251590548">Email</label>
                <input type="text" name="entry.1251590548" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label for="entry.1342795259">Subject</label>
                <input type="text" name="entry.1342795259" placeholder="Subject">
            </div>
            <div class="input-group-full">
                <label class="email" for="entry.1450922164">Description</label>
                <textarea name="entry.1450922164" class="large-input" placeholder="Please list all details"></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </section>
  </section>
  <div id="site-footer"></div>

  <div id="site-back-to-top"></div>
</body>
</html>
