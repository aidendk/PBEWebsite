<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Brotherhood of Engineers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="icon" href="PBEimages/favicon.ico">
    <meta name="theme-color" content="black">
  <script src="components/page-hero.js" defer></script>
  <script src="components/navbar.js" defer></script>
  <script src="components/footer.js" defer></script>
  <script src="components/back-to-top.js" defer></script>
  <script src="components/site-behavior.js" defer></script>
</head>
<body>
<div data-page-hero data-hero-class="login-header" data-hero-title="Login Portal"></div>

<!-- Login Form Section -->
<section class="login-section">
    <div class="login-container">
        <div class="login-icon">
            <img src="PBEimages/lockIcon.jpg" alt="Lock Icon">
        </div>
        <form id="loginForm">
            <label for="username">Username</label>
            <select id="username" name="username">
                <option value="Members">Members</option>
                <option value="Officers">Officers</option>
                <option value="Alumni">Alumni</option>
                <option value="Sweethearts">Sweethearts</option>
                <!-- Add more options as needed -->
            </select>
            <button class ="submit-button" type="submit">Proceed</button>
        </form>
        <p id="login-message" class="login-message" aria-live="polite"></p>
    </div>
</section>

<div id="site-footer"></div>

  <div id="site-back-to-top"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const loginForm = document.getElementById('loginForm');
      const usernameSelect = document.getElementById('username');
      const loginMessage = document.getElementById('login-message');

      if (!loginForm || !usernameSelect || !loginMessage) return;

      const routes = {
        Members: 'https://drive.google.com/drive/folders/1PzWpZqYmwKeEOuwwfU6P5cOtFOEPmzjY?usp=drive_link',
        Officers: 'https://drive.google.com/drive/u/2/folders/0AJ9GYNCaZ4TuUk9PVA',
        Alumni: 'https://drive.google.com/drive/folders/1CrKxTmvOmpcUELJG4kbXz5Nzy8IeqwGD?usp=drive_link',
        Sweethearts: 'https://drive.google.com/drive/folders/1qqFvj55Zig71Ld2U-oJe6rH_6kfa02Ej?usp=drive_link'
      };
     

      loginForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const selectedPortal = usernameSelect.value;
        const destination = routes[selectedPortal];

        if (destination && destination.trim()) {
          window.location.href = destination;
          return;
        }

        loginMessage.textContent =
          'Add the Google Drive link for ' + selectedPortal + ' in login.html.';
      });
    });
  </script>
</body>
</html>
