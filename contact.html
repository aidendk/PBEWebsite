<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="PBEimages\favicon.ico">
    <meta name="theme-color" content="black">
    <script type="text/javascript">
        var submitted = false;

        function validateForm() {
            var inputs = document.querySelectorAll('.contactFlex input[type="text"], .contactFlex textarea');
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === "") {
                    alert("All fields must be filled out");
                    return false;
                }
            }
            submitted = true;
            return true;
        }
    </script>
</head>
<body>
<section class="contact2-header">
  <nav>
    <div class="logo-container">
        <a href="./"><img src="PBEimages\PBETransparentdark.png" alt="Logo"></a>
    </div>
    <div class="hamburger">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>
    </div>
    <div class="nav-links">
        <button class="close-btn">&times;</button>
        <ul>
            <li><a href="./about">About Us</a></li>
            <li><a href="./members">Members</a></li>
            <li><a href="./philanthropy">Philanthropy</a></li>
            <li><a href="./"><img src="PBEimages/PBETransparentdark.png" alt="Logo"></a></li>
            <li><a href="./recruitment">Recruitment</a></li>
            <li><a href="./sponsors">Sponsors</a></li>
            <li><a href="./login">Login Portal</a></li>
        </ul>
    </div>
  </nav>
    <h1>Contact </h1>
  </section>
  <section class="contactus">
    <h2>Howdy, please fill out the form below and we will contact you shortly!</h2>
    <section class="recruitment">
        <div></div>
        <iframe name="hiddenConfirm" id="hiddenConfirm" style="display:none;" onload="if(submitted){window.location='./contactSent';}"></iframe>
        <form class="contactFlex" action="https://docs.google.com/forms/d/e/1FAIpQLSc-2B3gZ5GyZjCL8CBLEfbWHRMWK4srOjRAgpzEBfDfjC8QiQ/formResponse" method="post" target="hiddenConfirm" onsubmit="return validateForm()">
            <div class="input-group">
                <label for="entry.1180153643">First Name</label>
                <input type="text" name="entry.1180153643" placeholder="First">
            </div>
            <div class="input-group">
                <label for="entry.1975216193">Last Name</label>
                <input type="text" name="entry.1975216193" placeholder="Last">
            </div>
            <div class="input-group">
                <label for="entry.1251590548">Email</label>
                <input type="text" name="entry.1251590548" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label for="entry.1342795259">Subject</label>
                <input type="text" name="entry.1342795259" placeholder="Subject">
            </div>
            <div class="input-group-full">
                <label class="email" for="entry.1450922164">Description</label>
                <textarea name="entry.1450922164" class="large-input" placeholder="Please list all details"></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </section>
  </section>
  <section class="footer">
    <div class="social-links">
        <h3>Follow Us</h3>
        <ul>
            <li><a href="https://www.instagram.com/pbetamu?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer"><img src="PBEimages\insta.png" alt="Instagram"></a>
            <li><a href="https://www.linkedin.com/company/pbe-tamu/" target="_blank" rel="noopener noreferrer"><img src="PBEimages\linkedin.png" alt="Linkedin"></a></li>
        </ul>
        <h3>Want to reach out?</h3>
        <ul class="contact">
            <li><a href="./contact">Contact Us</a></li>
        </ul>
    </div>
    <div class="copyright">
      <p>&copy; 2024 PBE</p>
    </div>
</section>
<button id="back-to-top" title="Back to top">&uarr;</button>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        const links = document.querySelectorAll('.nav-links li');
        const closeBtn = document.querySelector('.close-btn');
        const backToTopButton = document.getElementById('back-to-top');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('change');
        });

        closeBtn.addEventListener('click', () => {
            navLinks.classList.remove('active');
            hamburger.classList.remove('change');
        });

        links.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                hamburger.classList.remove('change');
            });
        });

        window.onscroll = function() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        };

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    });
</script>
</body>
</html>
