<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="with=device-width, initial-scale=1.0">
    <title>Recruitment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" href="PBEimages\PBETransparentdark.png" type="image/x-icon">
    <meta name="theme-color" content="black">
    <script type="text/javascript">
        var submitted = false;

        function validateForm() {
            // Get all input elements
            var inputs = document.querySelectorAll('.recruitmentFlex input[type="text"]');
            // Loop through inputs to check for empty values
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === "") {
                    alert("All fields must be filled out");
                    return false;
                }
            }
            submitted = true;
            return true;
        }
    </script>


</head>
<body>
<section class="recruitment-header">
  <nav>
    <div class="logo-container">
        <a href="index.html"><img src="PBEimages\PBETransparentdark.png" alt="Logo"></a>
    </div>
    <div class="hamburger">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>
    </div>
    <div class="nav-links">
        <button class="close-btn">&times;</button>
        <ul>
            <li><a href="about.html">About Us</a></li>
            <li><a href="members.html">Members</a></li>
            <li><a href="index.html"><img src="PBEimages\PBETransparentdark.png" alt="Logo"></a></li>
            <li><a href="sponsors.html">Sponsors</a></li>
            <li><a href="recruitment.html">Recruitment</a></li>
        </ul>
    </div>
</nav>
    <h1>Recruitment</h1>
  </section>
  <section class = "recruitment">
    <div>
      <h1>Applications for Spring 2024 have ended.</h1>

      <h2>To get updates when recruitment starts again in the fall, fill out the form below!</h2>
    </div>
    <img src="PBEimages\Spring 24 Flyer Final.png">
    <iframe name="hiddenConfirm" id="hiddenConfirm" style="display:none;" onload="if(submitted){window.location='submitted.html';}"></iframe>
    <form class="recruitmentFlex" action="https://docs.google.com/forms/d/e/1FAIpQLSeHQfq-bYuPnlSX6HSlRGe2jZONtgTYI4tzpc8gVDKL3X-Q9w/formResponse" method="post" target="hiddenConfirm" onsubmit="return validateForm()">
        <label for="entry.915687450">First Name</label><br>
        <input type="text" name="entry.915687450" placeholder="First"><br>
        <label for="entry.1928436530">Last Name</label><br>
        <input type="text" name="entry.1928436530" placeholder="Last"><br>
        <label class="email" for="entry.1024772806">Email</label><br>
        <input type="text" name="entry.1024772806" placeholder="example@email.com"><br>
        <button type="submit">Submit</button>
    </form>
      
  </section>
  
  <section class="footer">
    
    <div class="social-links">
        <h3>Follow Us</h3>
        <ul>
            <li><a href="https://www.instagram.com/pbetamu?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="><img src="PBEimages\insta.png" alt="Instagram"></a>
            <li><a href="https://www.linkedin.com/company/pbe-tamu/"><img src="PBEimages\linkedin.png" alt="Linkedin"></a></li>
            
        </ul>
        <h3>Want to reach out?</h3>
        <ul class="contact">
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </div>
    <div class="copyright">
      <p>&copy; 2024 PBE</p>
  </div>
</section>
<button id="back-to-top" title="Back to top">&uarr;</button>


<script>
    document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        const links = document.querySelectorAll('.nav-links li');
        const closeBtn = document.querySelector('.close-btn');
        const backToTopButton = document.getElementById('back-to-top');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('change');
        });

        closeBtn.addEventListener('click', () => {
            navLinks.classList.remove('active');
            hamburger.classList.remove('change');
        });

        links.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                hamburger.classList.remove('change');
            });
        });

        window.onscroll = function() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        };

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    });
</script>
</body>
</html>
