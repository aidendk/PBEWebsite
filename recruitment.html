<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" href="PBEimages\favicon.ico">
    <meta name="theme-color" content="black">
    <script type="text/javascript">
        var submitted = false;

        function validateForm() {
            // Get all input elements
            var inputs = document.querySelectorAll('.recruitmentFlex input[type="text"]');
            // Loop through inputs to check for empty values
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === "") {
                    alert("All fields must be filled out");
                    return false;
                }
            }
            submitted = true;
            return true;
        }
    </script>


</head>
<body>
<section class="recruitment-header">
  <nav>
    <div class="logo-container">
        <a href="./"><img src="PBEimages\PBETransparentdark.png" alt="Logo"></a>
    </div>
    <div class="hamburger">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>
    </div>
    <div class="nav-links">
        <button class="close-btn">&times;</button>
        <ul>
            <li><a href="./about">About Us</a></li>
            <li><a href="./members">Members</a></li>
            <li><a href="./sponsors">Sponsors</a></li>
            <li><a href="./"><img src="PBEimages/PBETransparentdark.png" alt="Logo"></a></li>
            <li><a href="./recruitment">Recruitment</a></li>
            <li><a href="./contact">Contact</a></li>
            <li><a href="./login">Login Portal</a></li>
        </ul>
    </div>
</nav>
    <h1>Recruitment</h1>
  </section>
  <section class = "recruitment">
    <h1>Recuritment for Fall 2024 has concluded! <br><br>Fill out the form below for Spring 2025 updates!</h1>
    <div class="recruitmentMedia"> 
        <h2 style="font-size: 30px; margin-bottom: 10px; margin-top: 20px; ">Recruitment Video</h2>
        <div style="border-top: 4px solid #76cee6; margin: 20px 0;"></div>
        <div class="video-container">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/pcwvhLIUrio?si=6lmv4YZV03SxkGGZ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <h2 style="font-size: 30px; margin-bottom: 10px; margin-top: 40px; ">Recruitment Update Form</h2>
        <div style="border-top: 4px solid #76cee6; margin: 20px 0;"></div>
        <div class="recruitment-form">
            <img src="PBEimages\Spring 24 Flyer Final.png">
            <iframe name="hiddenConfirm" id="hiddenConfirm" style="display:none;" onload="if(submitted){window.location='./submitted';}">
            </iframe>
            <form class="recruitmentFlex" action="https://docs.google.com/forms/d/e/1FAIpQLSdCcAADdMxZZWWhKw4HU7PcwMHNlHnKEsOCXu7XrxcL7MaziA/formResponse" 
                  method="post" target="hiddenConfirm" onsubmit="return validateForm()">
                <label for="entry.1328555469">First Name</label><br>
                <input type="text" name="entry.1328555469" placeholder="First"><br>
                <label for="entry.1502007998">Last Name</label><br>
                <input type="text" name="entry.1502007998" placeholder="Last"><br>
                <label class="email" for="entry.1590393024">Email</label><br>
                <input type="text" name="entry.1590393024" placeholder="example@email.com"><br>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
      
  </section>
  
  <section class="footer">
    
    <div class="social-links">

            <li><a href="https://www.instagram.com/pbetamu?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer"><img src="PBEimages\insta.png" alt="Instagram"></a>
            <li><a href="https://www.linkedin.com/company/pbe-tamu/" target="_blank" rel="noopener noreferrer"><img src="PBEimages\linkedin.png" alt="Linkedin"></a></li>
            
        </ul>
        <h3>Want to reach out?</h3>
        <ul class="contact">
            <li><a href="./contact">Contact Us</a></li>
        </ul>
    </div>
    <div class="copyright">
      <p>&copy; 2024 PBE</p>
  </div>
</section>
<button id="back-to-top" title="Back to top">&uarr;</button>


<script>
    document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        const links = document.querySelectorAll('.nav-links li');
        const closeBtn = document.querySelector('.close-btn');
        const backToTopButton = document.getElementById('back-to-top');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('change');
        });

        closeBtn.addEventListener('click', () => {
            navLinks.classList.remove('active');
            hamburger.classList.remove('change');
        });

        links.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                hamburger.classList.remove('change');
            });
        });

        window.onscroll = function() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        };

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    });
</script>
</body>
</html>
