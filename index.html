
<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Brotherhood of Engineers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="PBEimages/favicon.ico">
  <script src="components/home-hero.js" defer></script>
  <script src="components/navbar.js" defer></script>
  <script src="components/footer.js" defer></script>
  <script src="components/back-to-top.js" defer></script>
  <script src="components/site-behavior.js" defer></script>
</head>

<body>
  <div data-home-hero></div>

  <div id="site-footer"></div>

  <div id="site-back-to-top"></div>

  </body>
  <section class="header">
    <nav>
      <div class="logo-container">
        <a href="./"><img src="PBEimages/PBETransparentdark.png" alt="Logo"></a>
      </div>

      <div class="hamburger">
        <div class="bar bar1"></div>
        <div class="bar bar2"></div>
        <div class="bar bar3"></div>
      </div>

      <div class="nav-links">
        <button class="close-btn" type="button">&times;</button>
        <ul>
          <li><a href="./about">About Us</a></li>
          <li><a href="./members">Members</a></li>
          <li><a href="./philanthropy">Philanthropy</a></li>

          <!-- Center logo only on desktop -->
          <li class="desktop-only">
            <a href="./"><img src="PBEimages/PBETransparentdark.png" alt="Logo"></a>
          </li>

          <li><a href="./recruitment">Recruitment</a></li>
          <li><a href="./sponsors">Sponsors</a></li>
          <li><a href="./login">Login Portal</a></li>

          <!-- Mobile-only golf button (inside hamburger menu) 
          <li >
            <a href="https://forms.gle/3GKhfcA6sTAFL2wd7"
               target="_blank"
               rel="noopener"
               class="golf-btn golf-btn-mobile">
              PBE Classic
            </a>
          </li>
        -->
        </ul>
      </div>
    </nav>

    <!-- Desktop/tablet announcement bar UNDER the nav (NOT inside <ul>) 
    <div class="announcement-bar">
      <a href="https://forms.gle/3GKhfcA6sTAFL2wd7"
         target="_blank"
         rel="noopener"
         class="golf-btn">
        PBE Classic Golf Tournament
      </a>
    </div>
  -->
  </section>

  <section class="footer">
    <div class="social-links">
      <h3>Follow Us</h3>
      <ul>
        <li><a href="https://www.instagram.com/pbetamu" target="_blank" rel="noopener"><img src="PBEimages/insta.png" alt="Instagram"></a></li>
        <li><a href="https://www.linkedin.com/company/pbe-tamu/" target="_blank" rel="noopener"><img src="PBEimages/linkedin.png" alt="Linkedin"></a></li>
      </ul>

      <h3>Want to reach out?</h3>
      <ul class="contact">
        <li><a href="./contact">Contact Us</a></li>
      </ul>
    </div>

    <div class="copyright">
      <p>&copy; 2025 PBE</p>
    </div>
  </section>

  <button id="back-to-top" title="Back to top">&uarr;</button>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const hamburger = document.querySelector('.hamburger');
      const navLinks = document.querySelector('.nav-links');
      const links = document.querySelectorAll('.nav-links li a');
      const closeBtn = document.querySelector('.close-btn');
      const backToTopButton = document.getElementById('back-to-top');

      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
      });

      closeBtn.addEventListener('click', () => {
        navLinks.classList.remove('active');
        hamburger.classList.remove('active');
      });

      links.forEach(link => link.addEventListener('click', () => {
        navLinks.classList.remove('active');
        hamburger.classList.remove('active');
      }));

      window.onscroll = function() {
        backToTopButton.style.display = (document.documentElement.scrollTop > 20) ? 'block' : 'none';
      };

      backToTopButton.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));
    });
  </script>
</body>
</html>
