<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" href="PBEimages\android-chrome-512x512.png" type="image/x-icon">
</head>
<body>
<section class="header">
    <nav>
        <div class="hamburger">
          <div class="bar bar1"></div>
          <div class="bar bar2"></div>
          <div class="bar bar3"></div>
        </div>
        <div class="nav-links">
            <ul>
                <li><a href="">About Us</a></li>
                <li><a href="">Members</a></li>
                <li><a href="index.html"><img src="PBEimages\PBETransparentdark.png"></a></li>
                <li><a href="">Sponsors</a></li>
                <li><a href="">Recruitment</a></li>
            </ul>
        </div>
    </nav>
  </section>
  <section class="footer">
    <div class="contact-info">
        <h3>Contact Information</h3>
        <p>Email: info@example.com</p>
    </div>
    <div class="social-links">
        <h3>Follow Us</h3>
        <ul>
            <li><a href="https://www.instagram.com/pbetamu?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="><img src="PBEimages\insta.png" alt="Instagram"></a>
            <li><a href="https://www.linkedin.com/company/pbe-tamu/"><img src="PBEimages\linkedin.png" alt="Linkedin"></a></li>
            
        </ul>
    </div>
    <div class="copyright">
      <p>&copy; 2024 PBE</p>
  </div>
</section>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');
  const links = document.querySelectorAll('.nav-links li');

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    hamburger.classList.toggle('change');
  });

  // Close the menu when a link is clicked
  links.forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
      hamburger.classList.remove('change');
    });
  });
});
    </script>



</body>
</html>
